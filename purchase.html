<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Purchase - Gym Shop</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav id="navbar-bg">
        <a class="icon" href="index.html#home">Home</a>
        <a class="icon" href="index.html#products">Products</a>
        <a class="icon" href="index.html#about">About Us</a>
    </nav>

    <main class="section-block">
        <h1>Checkout</h1>
        <p>Complete your purchase below.</p>

        <form class="checkout-form">
            <section class="form-section">
                <h2>Product Details</h2>
                <label for="product">Selected Product:</label>
                <select id="product" name="product">
                    <option value="dumbbell">Dumbbell Set</option>
                    <option value="barbell">Barbell</option>
                    <option value="kettlebell">Kettlebell</option>
                    <option value="yogamat">Yoga Mat</option>
                    <option value="bands">Resistance Bands</option>
                    <option value="pullup">Pull-up Bar</option>
                    <option value="bike">Exercise Bike</option>
                    <option value="treadmill">Treadmill</option>
                    <option value="bench">Weight Bench</option>
                    <option value="ball">Medicine Ball</option>
                </select>

                <label for="quantity">Number of Products:</label>
                <input type="number" id="quantity" name="quantity" min="1" value="1">
            </section>

            <section class="form-section">
                <h2>Shipping Address</h2>
                <label for="name">Full Name:</label>
                <input type="text" id="name" name="name" required>

                <label for="address">Address:</label>
                <input type="text" id="address" name="address" required>

                <label for="city">City:</label>
                <input type="text" id="city" name="city" required>

                <label for="state">State:</label>
                <input type="text" id="state" name="state" required>

                <label for="zip">ZIP Code:</label>
                <input type="text" id="zip" name="zip" required>
            </section>

            <section class="form-section">
                <h2>Billing Details</h2>
                <label for="payment-method">Payment Method:</label>
                <select id="payment-method" name="payment-method">
                    <option value="card">Credit/Debit Card</option>
                    <option value="upi">UPI</option>
                    <option value="cod">Cash on Delivery</option>
                </select>

                <div id="card-fields">
                    <label for="cardname">Name on Card:</label>
                    <input type="text" id="cardname" name="cardname">

                    <label for="cardnumber">Card Number:</label>
                    <input type="text" id="cardnumber" name="cardnumber">

                    <label for="expdate">Expiration Date:</label>
                    <input type="text" id="expdate" name="expdate" placeholder="MM/YY">

                    <label for="cvv">CVV:</label>
                    <input type="text" id="cvv" name="cvv">
                </div>

                <div id="upi-fields" style="display: none;">
                    <label for="upi-id">UPI ID:</label>
                    <input type="text" id="upi-id" name="upi-id" placeholder="yourname@upi">
                </div>

                <div id="cod-fields" style="display: none;">
                    <p class="cod-note">You will pay in cash when your order arrives. Please keep the exact amount ready for faster delivery.</p>
                </div>
            </section>

            <button type="submit" class="buy-button">Complete Purchase</button>
        </form>
    </main>

 
</body>
</html>
